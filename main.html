<!DOCTYPE html>
<html>
<head>
    <title>Vibration Analyzer</title>
    <style>
        body { font-family: sans-serif; padding: 10px; background: #1a1a1a; color: white; }
        canvas { background: #000; width: 100%; height: 150px; border: 1px solid #444; }
    </style>
</head>
<body>
    <button id="startBtn" style="padding: 10px;">Start Measurement</button>
    <button id="stopBtn" style="padding: 10px;" disabled>Stop</button>
    
    <p>Waveform:</p>
    <canvas id="waveCanvas"></canvas>
    <p>Frequency Spectrum:</p>
    <canvas id="freqCanvas"></canvas>

    <script>
        let data = [];
        let isMeasuring = false;
        const waveCtx = document.getElementById('waveCanvas').getContext('2d');
        const freqCtx = document.getElementById('freqCanvas').getContext('2d');

        window.addEventListener('devicemotion', (event) => {
            if (!isMeasuring) return;
            const acc = event.accelerationIncludingGravity;
            // Calculate magnitude and remove DC offset (Gravity)
            const magnitude = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2) - 9.81;
            data.push(magnitude);
            if(data.length > 256) data.shift(); // Keep latest 256 samples
            drawWaveform();
        });

        document.getElementById('startBtn').onclick = async () => {
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                const res = await DeviceMotionEvent.requestPermission();
                if (res !== 'granted') return;
            }
            data = []; isMeasuring = true;
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
        };

        document.getElementById('stopBtn').onclick = () => {
            isMeasuring = false;
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            runFFT();
        };

        function drawWaveform() {
            waveCtx.clearRect(0, 0, 300, 150);
            waveCtx.beginPath();
            waveCtx.strokeStyle = '#00ff00';
            data.forEach((val, i) => {
                waveCtx.lineTo(i * (300/256), 75 - (val * 10));
            });
            waveCtx.stroke();
        }

        function runFFT() {
            // Very simple FFT concept for 256 samples
            const n = data.length;
            const real = new Float32Array(data);
            const imag = new Float32Array(n);
            // Magnitude calculation
            freqCtx.clearRect(0, 0, 300, 150);
            freqCtx.fillStyle = '#ff0000';
            for (let i = 0; i < n/2; i++) {
                const mag = Math.sqrt(real[i]**2 + imag[i]**2);
                freqCtx.fillRect(i * 2, 150 - (mag * 5), 1, mag * 5);
            }
        }
    </script>
</body>
</html>
